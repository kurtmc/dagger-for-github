name: "Dagger for GitHub"
description: "Run dagger commands in Github Actions"
inputs:
  version:
    description: "Dagger Version. Use semver vX.Y.Z or 'latest'"
    required: false
    default: "latest"
  commit:
    description: "Dagger Dev Commit"
    required: false
    default: ""
  dagger-flags:
    description: "Dagger CLI Flags"
    required: false
    default: "--progress plain"
  verb:
    description: "CLI verb (check, call, run, download, up, functions, shell, query)"
    required: false
    default: "call"
  workdir:
    description: "The working directory in which to run the Dagger CLI"
    required: false
    default: "."
  cloud-token:
    description: "Dagger Cloud Token"
    required: false
    default: ""
  module:
    description: "Dagger module to call. Local or Git"
    required: false
    default: ""
  args:
    description: "Arguments to pass to CLI"
    required: false
    default: ""
  engine-stop:
    description: "Deprecated"
    deprecationMessage: "engine-stop is now a no-op and will be removed in a future release"
    required: false
  call:
    description: "Function and arguments for dagger call"
    required: false
    default: ""
  shell:
    description: "Function and arguments for dagger shell"
    required: false
    default: ""
  check:
    description: "Function and arguments for dagger check"
    required: false
    default: ""
  summary-path:
    description: "File path to write the job summary"
    required: false
    default: ""
  enable-github-summary:
    description: "Whether to write summary to GITHUB_STEP_SUMMARY"
    required: false
    default: "false"
  cache-engine:
    description: "Persist the Dagger engine's /var/lib/dagger state across runs via actions/cache. When true, the action pre-starts the engine container with a host bind mount, points the CLI at it via _EXPERIMENTAL_DAGGER_RUNNER_HOST, and saves/restores the state directory between runs."
    required: false
    default: "false"
  cache-engine-key:
    description: "Prefix for the actions/cache key used by cache-engine. The full key includes runner.os, dagger version, workflow, ref, and sha — set this to a custom suffix to invalidate, e.g. dagger-engine-${{ hashFiles('**/go.sum') }}."
    required: false
    default: "dagger-engine"
  cache-engine-path:
    description: "Host path to use for the engine state bind mount. Defaults to ${RUNNER_TEMP}/dagger-engine-state."
    required: false
    default: ""
outputs:
  output:
    description: "Job output"
    value: ${{ steps.exec.outputs.stdout }}
  traceURL:
    description: "Dagger Cloud trace URL"
    value: ${{ steps.exec.outputs.traceURL }}
runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        set -o pipefail
        # Fallback to /usr/local for backwards compatability
        prefix_dir="${RUNNER_TEMP:-/usr/local}"
        # Ensure the dir is writable otherwise fallback to tmpdir
        if [[ ! -d "$prefix_dir" ]] || [[ ! -w "$prefix_dir" ]]; then
            prefix_dir="$(mktemp -d)"
        fi
        printf '%s/bin' "$prefix_dir" >> $GITHUB_PATH

        # If the dagger version is 'latest', set the version back to an empty
        # string. This allows the install script to detect and install the latest
        # version itself
        VERSION=${{ inputs.version }}
        if [[ "$VERSION" == "latest" ]]; then
          VERSION=
        elif [[ -n "$VERSION" && "$VERSION" != v* ]]; then
          # Add 'v' prefix if version doesn't start with 'v' and is not empty
          VERSION="v$VERSION"
        fi

        COMMIT=${{ inputs.commit }}

        if [[ -x "$(command -v dagger)" ]]; then
          echo "::group::Checking dagger"
          version="$(dagger --silent version | cut --fields 2 --delimiter ' ')"
          echo "Found existing dagger version: $version"
          if [[ -z "$VERSION" ]]; then
            latest=$(curl -s https://dl.dagger.io/dagger/versions/latest)
          fi
          if [[ "$version" == "$VERSION" ]] || \
             [[ -z "$VERSION" && "$version" == "$latest" ]]; then
            echo "dagger ${version} is already installed, skipping installation"
            exit 0
          fi
          echo "::endgroup::"
        fi

        echo "::group::Installing dagger"
        curl -fsSL https://dl.dagger.io/dagger/install.sh | \
        BIN_DIR=${prefix_dir}/bin DAGGER_VERSION="$VERSION" DAGGER_COMMIT="$COMMIT" sh
        echo "::endgroup::"

    - id: should-exec
      shell: bash
      env:
        INPUT_CALL: ${{ inputs.call }}
        INPUT_SHELL: ${{ inputs.shell }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_CHECK: ${{ inputs.check }}
        INPUT_VERB: ${{ inputs.verb }}
      run: |
        # Determine if the user wants to execute a dagger command or just install
        if [[ -n "$INPUT_CALL" ]] || \
           [[ -n "$INPUT_SHELL" ]] || \
           [[ -n "$INPUT_ARGS" ]] || \
           [[ -n "$INPUT_CHECK" ]] || \
           [[ "$INPUT_VERB" != "call" ]]; then
          echo "result=true" >> "$GITHUB_OUTPUT"
        fi
    - id: assemble
      if: steps.should-exec.outputs.result == 'true'
      shell: bash
      env:
        INPUT_MODULE: ${{ inputs.module }}
      run: |
        verb=${{ inputs.verb }}
        shell=$(echo '${{ toJSON(inputs.shell) }}' | jq -rj .)
        # Collapse backslash-continuations and newlines into spaces for CLI args
        dagger_flags=$(echo '${{ toJSON(inputs.dagger-flags) }}' | jq -rj . | sed -z 's/\\\n/ /g; s/\n/ /g')
        args=$(echo '${{ toJSON(inputs.args) }}' | jq -rj . | sed -z 's/\\\n/ /g; s/\n/ /g')
        call=$(echo '${{ toJSON(inputs.call) }}' | jq -rj . | sed -z 's/\\\n/ /g; s/\n/ /g')
        check=$(echo '${{ toJSON(inputs.check) }}' | jq -rj . | sed -z 's/\\\n/ /g; s/\n/ /g')
        if [[ -n "${{ inputs.call }}" ]]; then
          verb="call"
        elif [[ -n "$check" ]]; then
          verb="check"
          # check input is used as a trigger; don't pass glob patterns as args
          check=""
        elif [[ "$shell" != "" ]]; then
          verb=""
          script=$(mktemp)
          printf '%s' "$shell" > $script
        fi
        echo "script=$script" >> "$GITHUB_OUTPUT"
        echo "verb=$verb" >> "$GITHUB_OUTPUT"
        echo "dagger-flags=$dagger_flags" >> "$GITHUB_OUTPUT"
        echo "args=$args" >> "$GITHUB_OUTPUT"
        echo "call=$call" >> "$GITHUB_OUTPUT"
        echo "check=$check" >> "$GITHUB_OUTPUT"
    - id: engine-cache-restore
      if: inputs.cache-engine == 'true' && steps.should-exec.outputs.result == 'true'
      uses: actions/cache/restore@v4
      with:
        path: ${{ inputs.cache-engine-path == '' && format('{0}/dagger-engine-state', runner.temp) || inputs.cache-engine-path }}
        key: ${{ inputs.cache-engine-key }}-${{ runner.os }}-${{ inputs.version }}-${{ inputs.commit }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ${{ inputs.cache-engine-key }}-${{ runner.os }}-${{ inputs.version }}-${{ inputs.commit }}-${{ github.workflow }}-${{ github.ref_name }}-
          ${{ inputs.cache-engine-key }}-${{ runner.os }}-${{ inputs.version }}-${{ inputs.commit }}-${{ github.workflow }}-
          ${{ inputs.cache-engine-key }}-${{ runner.os }}-${{ inputs.version }}-${{ inputs.commit }}-
    - id: engine-start
      if: inputs.cache-engine == 'true' && steps.should-exec.outputs.result == 'true'
      shell: bash
      env:
        INPUT_CACHE_PATH: ${{ inputs.cache-engine-path }}
      run: |
        set -o pipefail
        echo "::group::Starting Dagger engine with persistent cache mount"

        # Match the engine image to the installed CLI version to avoid skew
        engine_version=$(dagger version | awk '{print $2}')
        if [[ -z "$engine_version" ]]; then
          echo "::error::could not determine dagger version"; exit 1
        fi

        cache_path="${INPUT_CACHE_PATH:-${RUNNER_TEMP}/dagger-engine-state}"
        container_name="dagger-engine.gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

        mkdir -p "$cache_path"

        docker run -d --rm --privileged \
          --name "$container_name" \
          -v "$cache_path:/var/lib/dagger" \
          "registry.dagger.io/engine:$engine_version"

        # Wait for the engine to be ready (BuildKit listening). 30s is comfortable
        # for warm image pulls; cold pulls of the engine image fall under the
        # docker run step itself, so the engine should be near-instant once running.
        ready=0
        for i in $(seq 1 30); do
          if docker exec "$container_name" buildctl debug workers >/dev/null 2>&1; then
            echo "engine ready after ${i}s"
            ready=1
            break
          fi
          sleep 1
        done
        if [[ "$ready" -ne 1 ]]; then
          echo "::error::dagger engine did not become ready within 30s"
          docker logs "$container_name" || true
          exit 1
        fi

        # Hand the engine off to the CLI for the exec step
        echo "_EXPERIMENTAL_DAGGER_RUNNER_HOST=docker-container://$container_name" >> "$GITHUB_ENV"
        # Persist for the stop/save steps to pick up
        echo "DAGGER_ENGINE_CONTAINER_NAME=$container_name" >> "$GITHUB_ENV"
        echo "DAGGER_ENGINE_CACHE_PATH=$cache_path" >> "$GITHUB_ENV"
        echo "::endgroup::"
    - id: exec
      if: steps.should-exec.outputs.result == 'true'
      shell: bash
      env:
        INPUT_MODULE: ${{ inputs.module }}
        VERB: ${{ steps.assemble.outputs.verb }}
        SCRIPT: ${{ steps.assemble.outputs.script }}
      run: |
        tmpout=$(mktemp)
        tmperr=$(mktemp)
        cd ${{ inputs.workdir }} && { \
        DAGGER_CLOUD_TOKEN=${{ inputs.cloud-token }} \
        dagger \
        ${{ steps.assemble.outputs.dagger-flags }} \
        ${VERB} \
        ${INPUT_MODULE:+-m $INPUT_MODULE} \
        ${{ steps.assemble.outputs.args || steps.assemble.outputs.call || steps.assemble.outputs.script || steps.assemble.outputs.check }}; } 1> >(tee "${tmpout}") 2> >(tee "${tmperr}" >&2)

        {
          # we need a delim that doesn't appear in the output - a hash of the
          # file itself *probably* won't (if it does, we have larger
          # cryptographic problems)
          delim="$(sha256sum $tmpout | cut -d " " -f1)"
          echo "stdout<<${delim}"
          cat "${tmpout}"
          echo
          echo "${delim}"
        } >> "$GITHUB_OUTPUT"

        # Extract trace URL from stderr and set as traceURL output
        trace_url=$((grep -Eo 'https://dagger.cloud(/[^ ]+/traces/[a-zA-Z0-9]+|/traces/setup)' "${tmperr}" || true) | head -n1)
        if [[ -n "$trace_url" ]]; then
          echo "traceURL=$trace_url" >> "$GITHUB_OUTPUT"
        fi

        # Generate job summary content
        summary_content(){
          echo -e "## Command\n"
          echo '```bash'
          cmd="dagger $VERB ${{ steps.assemble.outputs.args || steps.assemble.outputs.call || steps.assemble.outputs.script || steps.assemble.outputs.check }}"
          if [[ -n "$INPUT_MODULE" ]]; then
            echo -e -E "DAGGER_MODULE=\"$INPUT_MODULE\" $cmd"
          else
            echo -e -E "$cmd"
          fi
          echo '```'
          if [[ -n "$SCRIPT" ]]; then
            echo -e "### Script\n"
            echo '```bash'
            cat "$SCRIPT"
            echo -e "\n"
            echo '```'
          fi

          echo -e "## Dagger trace\n"
          if [[ -n "$trace_url" ]]; then
            echo "[$trace_url]($trace_url)"
          else
            echo "No trace available. To setup: [https://dagger.cloud/traces/setup](https://dagger.cloud/traces/setup)"
          fi

          echo -e "## Dagger version\n"
          echo '```bash'
          dagger version || true
          echo '```'

          echo -e "---\n"
        }

        # Write to custom summary path if specified
        if [[ -n "${{ inputs.summary-path }}" ]]; then
          summary_content > "${{ inputs.summary-path }}"
        fi

        # Write to GitHub step summary if enabled (default: true)
        if [[ "${{ inputs.enable-github-summary }}" == "true" ]]; then
          summary_content > "${GITHUB_STEP_SUMMARY}"
        fi
    - id: engine-stop
      if: always() && inputs.cache-engine == 'true' && steps.should-exec.outputs.result == 'true'
      shell: bash
      run: |
        echo "::group::Stopping Dagger engine to flush cache state"
        if [[ -z "$DAGGER_ENGINE_CONTAINER_NAME" ]]; then
          echo "no engine container recorded; skipping"
          exit 0
        fi
        if docker ps -a --format '{{.Names}}' | grep -qx "$DAGGER_ENGINE_CONTAINER_NAME"; then
          # 60s graceful timeout — BuildKit's shutdown handler flushes its state to disk
          docker stop -t 60 "$DAGGER_ENGINE_CONTAINER_NAME" || true
        else
          echo "container $DAGGER_ENGINE_CONTAINER_NAME not present"
        fi
        echo "::endgroup::"
    - id: engine-cache-save
      if: always() && inputs.cache-engine == 'true' && steps.should-exec.outputs.result == 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ inputs.cache-engine-path == '' && format('{0}/dagger-engine-state', runner.temp) || inputs.cache-engine-path }}
        key: ${{ inputs.cache-engine-key }}-${{ runner.os }}-${{ inputs.version }}-${{ inputs.commit }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.sha }}
